<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHSAT Adaptive AI Simulation</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#001f4d,#0b3d91);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{width:720px;}

h1{text-align:center;margin-bottom:20px;}

#card{
background:white;
color:#1f2d3d;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,.3);
min-height:260px;
transition:opacity .3s;
}

.choice{
background:#e8f1ff;
padding:12px;
margin:10px 0;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.choice:hover{background:#cce0ff;}
.correct{background:#c8f7c5 !important;}
.incorrect{background:#ffcccc !important;}

#controls{text-align:center;margin-top:15px;}

button{
padding:10px 20px;
border:none;
background:#0057b7;
color:white;
border-radius:6px;
cursor:pointer;
}

#dashboard{
margin-top:20px;
background:#111;
padding:15px;
border-radius:8px;
font-size:14px;
}
</style>
</head>
<body>

<div id="app">

<h1>📘 SHSAT Reading – AI Simulated CAT</h1>

<div id="card">
<h3 id="skillLabel"></h3>
<p id="questionText"></p>
<div id="choices"></div>
</div>

<div id="controls">
<button id="nextBtn">Next Question</button>
</div>

<div id="dashboard">
Ability (θ): <span id="thetaDisplay">0.00</span> |
SE: <span id="seDisplay">1.00</span> |
Questions: <span id="qCount">0</span>
</div>

</div>

<script>

// =========================
// ADAPTIVE VARIABLES
// =========================

let theta = 0;
let standardError = 1;
let questionCount = 0;
let maxQuestions = 25;
let learningRate = 0.4;
let resultsLog = [];
let currentQuestion = null;

// =========================
// AI TOPIC POOL
// =========================

const topics = [
"urban gardening","renewable energy","school technology",
"community volunteering","sleep science","climate change",
"nutrition","reading fiction","public transportation",
"social media","space exploration","recycling",
"local businesses","wildlife conservation","mental health"
];

const skills = ["Main Idea","Evidence","Trap Detection","Author Purpose"];

// =========================
// IRT LOGISTIC MODEL
// =========================

function logistic(theta,a,b){
return 1/(1+Math.exp(-a*(theta-b)));
}

function updateTheta(response,a,b){
let p = logistic(theta,a,b);
let gradient = a*(response-p);
theta += learningRate * gradient;
standardError = Math.max(.2,1/Math.sqrt(questionCount+1));
}

// =========================
// SIMULATED AI GENERATOR
// =========================

function generateQuestion(){

let skill = skills[Math.floor(Math.random()*skills.length)];
let topic = topics[Math.floor(Math.random()*topics.length)];

let difficulty = Math.round(theta);

let a = 1.4 + Math.random()*.6;
let b = difficulty + (Math.random()-.5);

let questionText="";
let correct="";
let distractors=[];

if(skill==="Main Idea"){
questionText=`The passage discusses ${topic} and explains its benefits and challenges. What is the main idea?`;
correct=`${topic} has both benefits and challenges.`;
distractors=[
`${topic} is always beneficial.`,
`${topic} has no impact.`,
`${topic} should be banned immediately.`
];
}

if(skill==="Evidence"){
questionText=`Which detail best supports the claim about ${topic}?`;
correct=`A study showing measurable results related to ${topic}.`;
distractors=[
`An opinion about ${topic}.`,
`A vague statement mentioning ${topic}.`,
`A general comment unrelated to data.`
];
}

if(skill==="Trap Detection"){
questionText=`Which answer contains extreme language about ${topic}?`;
correct=`${topic} always solves every problem.`;
distractors=[
`${topic} sometimes helps.`,
`${topic} may provide benefits.`,
`${topic} often improves situations.`
];
}

if(skill==="Author Purpose"){
questionText=`Why does the author write about ${topic}?`;
correct=`To inform readers about key aspects of ${topic}.`;
distractors=[
`To confuse readers.`,
`To entertain with fiction.`,
`To criticize unrelated topics.`
];
}

// shuffle answers
let answers=[correct,...distractors];
answers.sort(()=>Math.random()-.5);
let correctIndex = answers.indexOf(correct);

return{
skill,
questionText,
choices:answers,
correct:correctIndex,
a,
b
};

}

// =========================
// LOAD QUESTION
// =========================

function loadQuestion(){

if(questionCount>=maxQuestions){
endAssessment();
return;
}

currentQuestion = generateQuestion();

document.getElementById("skillLabel").innerText =
"Skill: "+currentQuestion.skill;

document.getElementById("questionText").innerText =
currentQuestion.questionText;

let choicesDiv=document.getElementById("choices");
choicesDiv.innerHTML="";

currentQuestion.choices.forEach((choice,index)=>{

let div=document.createElement("div");
div.className="choice";
div.innerText=choice;

div.onclick=function(){

if(div.classList.contains("correct")||div.classList.contains("incorrect"))return;

questionCount++;

let correct=(index===currentQuestion.correct)?1:0;

if(correct){
div.classList.add("correct");
}else{
div.classList.add("incorrect");
}

updateTheta(correct,currentQuestion.a,currentQuestion.b);

resultsLog.push({
skill:currentQuestion.skill,
correct:correct
});

updateDashboard();
};

choicesDiv.appendChild(div);
});
}

function updateDashboard(){
document.getElementById("thetaDisplay").innerText=theta.toFixed(2);
document.getElementById("seDisplay").innerText=standardError.toFixed(2);
document.getElementById("qCount").innerText=questionCount;
}

function endAssessment(){

let correctCount=resultsLog.filter(r=>r.correct===1).length;
let accuracy=Math.round((correctCount/resultsLog.length)*100);

document.getElementById("card").innerHTML=
"<h2>Assessment Complete</h2>"+
"<p>Final Ability (θ): "+theta.toFixed(2)+"</p>"+
"<p>Standard Error: "+standardError.toFixed(2)+"</p>"+
"<p>Accuracy: "+accuracy+"%</p>"+
"<button onclick='downloadResults()'>Download Results</button>";
}

function downloadResults(){

let csv="SHSAT Adaptive Results\n";
csv+="Final Ability,"+theta.toFixed(2)+"\n";
csv+="Standard Error,"+standardError.toFixed(2)+"\n";
csv+="Total Questions,"+resultsLog.length+"\n\n";
csv+="Skill,Correct\n";

resultsLog.forEach(r=>{
csv+=r.skill+","+(r.correct?"Yes":"No")+"\n";
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="SHSAT_AI_Simulated_Results.csv";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
}

document.getElementById("nextBtn").addEventListener("click",loadQuestion);

loadQuestion();

</script>
</body>
</html>>
