<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHSAT Advanced CAT Engine</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#001f4d,#0b3d91);
    color:white;
    text-align:center;
}

h1 { margin-top:20px; }

#container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

#questionBox {
    background:white;
    color:#1f2d3d;
    padding:30px;
    border-radius:12px;
    margin-top:20px;
    text-align:left;
}

.choice {
    background:#e8f1ff;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    cursor:pointer;
}

.choice:hover { background:#cce0ff; }
.correct { background:#c8f7c5 !important; }
.incorrect { background:#ffcccc !important; }

#dashboard {
    margin-top:20px;
    background:#111;
    padding:15px;
    border-radius:8px;
}

button {
    padding:10px 20px;
    margin-top:15px;
    border:none;
    background:#0057b7;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>📘 SHSAT Reading – Advanced CAT Mode</h1>

<div id="container">

<div id="questionBox">
<h3 id="skillLabel"></h3>
<p id="questionText"></p>
<div id="choices"></div>
</div>

<button onclick="nextQuestion()">Next Question</button>

<div id="dashboard">
Ability (θ): <span id="thetaDisplay">0.00</span><br>
Standard Error: <span id="seDisplay">1.00</span><br>
Questions Answered: <span id="qCount">0</span>
</div>

</div>

<script>

let theta = 0;         // ability estimate
let standardError = 1; // confidence measure
let questionCount = 0;
let maxQuestions = 12;
let learningRate = 0.4;
let asked = [];

const questionBank = [
{
skill:"Main Idea",
a:1.2,
b:-1,
question:"The passage lists several benefits of exercise. What is the main idea?",
choices:["Exercise is difficult","Exercise has many benefits","Exercise is boring","Exercise is optional"],
correct:1
},
{
skill:"Evidence",
a:1.5,
b:0,
question:"Which detail best supports the claim about sleep improving memory?",
choices:["Students like sleep","Studies show improved recall","Sleep feels relaxing","Schools start early"],
correct:1
},
{
skill:"Main Idea",
a:1.8,
b:1,
question:"The author evaluates economic tradeoffs and environmental risk. What is the central argument?",
choices:["Growth is best","Balance requires tradeoffs","Environment irrelevant","Policies fail"],
correct:1
},
{
skill:"Evidence",
a:2.0,
b:2,
question:"Which quotation most strongly supports the policy's long-term impact?",
choices:[
"Policy matters",
"Data shows 30% reduction over 10 years",
"People support policy",
"Climate change is real"
],
correct:1
}
];

function logistic(theta, a, b){
return 1 / (1 + Math.exp(-a * (theta - b)));
}

function updateTheta(response, a, b){
let p = logistic(theta, a, b);
let gradient = a * (response - p);
theta += learningRate * gradient;
standardError = Math.max(0.2, 1 / Math.sqrt(questionCount+1));
}

function selectQuestion(){
let sorted = questionBank
.filter(q => !asked.includes(q))
.sort((a,b)=>Math.abs(a.b - theta) - Math.abs(b.b - theta));

return sorted[0];
}

function loadQuestion(){

if(questionCount >= maxQuestions){
document.getElementById("questionBox").innerHTML =
"<h2>Assessment Complete</h2><p>Final Ability Estimate: "+theta.toFixed(2)+"</p>";
return;
}

let q = selectQuestion();
currentQuestion = q;
asked.push(q);

document.getElementById("skillLabel").innerText =
"Skill: "+q.skill+" | Difficulty (b): "+q.b;

document.getElementById("questionText").innerText = q.question;

let choicesDiv = document.getElementById("choices");
choicesDiv.innerHTML="";

q.choices.forEach((choice,index)=>{
let div=document.createElement("div");
div.className="choice";
div.innerText=choice;

div.onclick=()=>{
questionCount++;
let correct = (index===q.correct)?1:0;

if(correct){
div.classList.add("correct");
}else{
div.classList.add("incorrect");
}

updateTheta(correct, q.a, q.b);
updateDashboard();
};

choicesDiv.appendChild(div);
});
}

function updateDashboard(){
document.getElementById("thetaDisplay").innerText = theta.toFixed(2);
document.getElementById("seDisplay").innerText = standardError.toFixed(2);
document.getElementById("qCount").innerText = questionCount;
}

function nextQuestion(){
loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
